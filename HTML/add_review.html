<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Review</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
</head>

<body>

<div class="wrapper">

    <div class="logo-container">
        <img src="{{ url_for('static', filename='Gamelens.png') }}" class="logo">
    </div>

    <h1>Add Review</h1>

    <form action="/add-review" method="POST">

        <div class="input-box">
            <input type="text" name="game" placeholder="Game Name" required>
            <i class='bx bx-game'></i>
        </div>

        <div class="input-box">
            <input type="number" name="rating" placeholder="Rating (1-10)" min="1" max="10" required>
            <i class='bx bx-star'></i>
        </div>

        <div class="input-box">
            <input type="text" name="review" placeholder="Write your review..." required>
            <i class='bx bx-message'></i>
        </div>

        <button type="submit" class="btn">Submit Review</button>

    </form>

    <div class="register-link">
{{ url_for('browse_games') }}
    </div>

</div>

</body>
</html>
