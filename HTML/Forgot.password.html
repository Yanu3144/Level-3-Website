<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - GameLens</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
</head>
<body>
    
    <div class="wrapper">
        <form action="/forgot-password" method="POST">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='Gamelens.png') }}" alt="GameLens Logo" class="logo">
            </div>

            <h1>Reset Password</h1>
            <p style="text-align: center; margin-bottom: 20px; font-size: 14.5px;">
                Enter your email address and we'll send you a link to reset your password.
            </p>
            
            <div class="input-box">
                <input type="email" name="email" placeholder="Email Address" required>
                <i class='bx bx-envelope'></i>
            </div>

            <button type="submit" class="btn">Send Reset Link</button>
            
            <div class="register-link">
                <p>Remember your password? <a href="{{ url_for('login_page') }}">Back to Login</a></p>
            </div>
        </form>      
    </div>

</body>
</html>
