<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - GameLens</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
</head>
<body>
    <div class="wrapper">
        <form action="/register" method="POST">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='Gamelens.png') }}" alt="GameLens Logo" class="logo">
            </div>
            <h1>Register</h1>
            <div class="input-box">
                <input type="text" name="username" placeholder="Username" required>
                <i class='bx bx-user'></i>
            </div>
            <div class="input-box">
                <input type="email" name="email" placeholder="Email" required>
                <i class='bx bx-envelope'></i>
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
                <i class='bx bx-lock-alt'></i>
            </div>
            <button type="submit" class="btn">Register</button>
            <div class="register-link">
                <p>Already have an account? <a href="{{ url_for('login_page') }}">Login</a></p>
            </div>
        </form>
        {% if error %}
        <p style="color: red; text-align: center; margin-top: 10px;">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
